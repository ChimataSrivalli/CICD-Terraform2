replicaCount: 2

image:
  repository: flask-app
  tag: latest
  pullPolicy: Never

service:

  type: NodePort

  port: 80

  targetPort: 5000

  nodePort: 30080

resources:
  requests:
    cpu: 200m
    memory: 256Mi

  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:

  enabled: true

  minReplicas: 2

  maxReplicas: 5

  targetCPUUtilizationPercentage: 70

ingress:

  enabled: true

  host: flask.local  
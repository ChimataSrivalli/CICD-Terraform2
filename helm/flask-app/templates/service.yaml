 apiVersion: v1
kind: Service

metadata:
  name: {{ include "flask-app.fullname" . }}

  labels:
    app: {{ include "flask-app.name" . }}

spec:

  type: {{ .Values.service.type }}

  selector:
    app: {{ include "flask-app.name" . }}

  ports:

    - name: http

      protocol: TCP

      port: {{ .Values.service.port }}

      targetPort: {{ .Values.service.targetPort }}

      nodePort: {{ .Values.service.nodePort }}